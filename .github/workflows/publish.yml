name: Publish packages

on:
  push:
    branches: [main]
    paths:
      - "packages/vue/**"
      - "packages/cli/**"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: "@vite-plugin-stickynote/vue"
            directory: "packages/vue"
          - package: "@vite-plugin-stickynote/cli"
            directory: "packages/cli"
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Resolve publish action
        id: check
        env:
          PACKAGE_NAME: ${{ matrix.package }}
          PACKAGE_DIR: ${{ matrix.directory }}
        run: |
          set -euo pipefail
          LOCAL=$(node -p "require('./${PACKAGE_DIR}/package.json').version")
          LATEST=$(npm view "${PACKAGE_NAME}" version 2>/dev/null || true)
          echo "package=${PACKAGE_NAME} local=$LOCAL latest=${LATEST:-<none>}"
          if [ -z "$LATEST" ]; then
            echo "No published version yet — the first release must be published manually."
            exit 0
          fi
          if [ "$LOCAL" = "$LATEST" ]; then
            echo "${PACKAGE_NAME}@${LOCAL} already published; nothing to do."
            exit 0
          fi
          NEWER=$(node -e '
            const [a, b] = process.argv.slice(1);
            const parse = (v) => {
              const [main, pre = ""] = v.split("-");
              return [main.split(".").map(Number), pre];
            };
            const cmp = (x, y) => {
              const [xm, xp] = parse(x);
              const [ym, yp] = parse(y);
              for (let i = 0; i < 3; i++) if (xm[i] !== ym[i]) return xm[i] - ym[i];
              if (!xp && yp) return 1;
              if (xp && !yp) return -1;
              return xp < yp ? -1 : xp > yp ? 1 : 0;
            };
            process.stdout.write(cmp(a, b) > 0 ? "1" : "0");
          ' "$LOCAL" "$LATEST")
          if [ "$NEWER" != "1" ]; then
            echo "Local ${PACKAGE_NAME}@${LOCAL} is not newer than published ${LATEST}; skipping."
            exit 0
          fi
          if [[ "$LOCAL" == *-* ]]; then
            TAG=$(echo "$LOCAL" | sed -E 's/.*-([a-zA-Z]+).*/\1/')
          else
            TAG=latest
          fi
          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$LOCAL" >> "$GITHUB_OUTPUT"

      - name: Publish to npm (OIDC / Trusted Publisher)
        if: steps.check.outputs.publish == 'true'
        run: |
          pnpm --filter "${{ matrix.package }}" publish \
            --access public \
            --no-git-checks \
            --tag "${{ steps.check.outputs.tag }}" \
            --provenance

      - name: Summary
        if: steps.check.outputs.publish == 'true'
        run: |
          echo "Published ${{ matrix.package }}@${{ steps.check.outputs.version }} (tag: ${{ steps.check.outputs.tag }})" >> "$GITHUB_STEP_SUMMARY"
